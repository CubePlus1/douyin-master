name: Deploy Douyin Vue to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: douyin-phone-mvp-vue/package-lock.json

      - name: Install dependencies
        working-directory: douyin-phone-mvp-vue
        run: npm ci --legacy-peer-deps

      - name: Build site
        working-directory: douyin-phone-mvp-vue
        run: npm run build-gp-pages

      - name: Copy Chovy static app
        run: |
          mkdir -p douyin-phone-mvp-vue/dist/chovy
          cp -R Chovy/. douyin-phone-mvp-vue/dist/chovy/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: douyin-phone-mvp-vue/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
